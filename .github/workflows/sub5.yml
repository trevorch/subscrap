name: sub5搜集

on:
  schedule:
    - cron: "*/30 * * * *"   # 每30分钟自动运行一次（UTC），北京时间 02/08/14/20 点
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: write             # 允许 push 文件到仓库
env:
  TZ: Asia/Shanghai
  
jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        
      - name: 获取 mieru 最新版本号
        id: mieru_release
        run: |
          TAG=$(curl -fsSL https://api.github.com/repos/enfein/mieru/releases/latest \
            | grep -oP '"tag_name":\s*"\K[^"]+')
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: 下载并安装 mieru 客户端 (amd64 .deb)
        run: |
          VERSION=${{ steps.mieru_release.outputs.version }}
          curl -fSsLO "https://github.com/enfein/mieru/releases/download/v${VERSION}/mieru_${VERSION}_amd64.deb"
          sudo dpkg -i "mieru_${VERSION}_amd64.deb"
          mieru version

      - name: 解析 SUB5_PROXY 链接并生成完整客户端配置
        env:
          SUB5_PROXY: ${{ vars.SUB5_PROXY }}
        run: |
          python3 - <<'PYEOF'
          import os, json, ipaddress
          from urllib.parse import urlparse, parse_qs, unquote

          url = os.environ["SUB5_PROXY"]
          if not url:
              raise SystemExit("环境变量 SUB5_PROXY 为空")

          parsed = urlparse(url)
          username = unquote(parsed.username or "")
          password = unquote(parsed.password or "")
          host = parsed.hostname

          qs = parse_qs(parsed.query)
          profile = unquote(qs.get("profile", ["default"])[0])
          multiplexing = qs.get("multiplexing", ["MULTIPLEXING_LOW"])[0]
          ports = qs.get("port", [])
          protocols = qs.get("protocol", [])

          port_bindings = []
          for p, proto in zip(ports, protocols):
              binding = {"protocol": proto}
              if "-" in p:
                  binding["portRange"] = p
              else:
                  binding["port"] = int(p)
              port_bindings.append(binding)

          server = {"portBindings": port_bindings}
          try:
              ipaddress.ip_address(host)
              server["ipAddress"] = host
              server["domainName"] = ""
          except ValueError:
              server["domainName"] = host
              server["ipAddress"] = ""

          config = {
              "profiles": [
                  {
                      "profileName": profile,
                      "user": {"name": username, "password": password},
                      "servers": [server],
                      "multiplexing": {"level": multiplexing},
                  }
              ],
              "activeProfile": profile,
              "rpcPort": 8964,
              "socks5Port": 1080,
              "socks5ListenLAN": False,
              "httpProxyPort": 10809,
              "httpProxyListenLAN": False,
              "loggingLevel": "INFO",
          }

          with open("/tmp/mieru_client_config.json", "w", encoding="utf-8") as f:
              json.dump(config, f, ensure_ascii=False, indent=2)

          print(json.dumps(config, ensure_ascii=False, indent=2))
          PYEOF

      - name: 应用 mieru 客户端配置
        run: |
          mieru apply config /tmp/mieru_client_config.json
          mieru describe config

      - name: 启动 mieru 客户端
        run: |
          mieru start
          sleep 2
          mieru describe config

      - name: 测试代理连通性（HTTP 代理端口 10809）
        run: |
          curl -x http://127.0.0.1:10809 -v https://www.google.com -o /dev/null

      - name: (可选) 让后续步骤走这个 HTTP 代理
        run: |
          echo "http_proxy=http://127.0.0.1:10809" >> "$GITHUB_ENV"
          echo "https_proxy=http://127.0.0.1:10809" >> "$GITHUB_ENV"
          echo "HTTP_PROXY=http://127.0.0.1:10809" >> "$GITHUB_ENV"
          echo "HTTPS_PROXY=http://127.0.0.1:10809" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install requests

      - name: Fetch subscription
        env:
          SUB5_REPO: ${{ vars.SUB5_REPO }}
          HTTP_PROXY: http://127.0.0.1:10809
          HTTPS_PROXY: http://127.0.0.1:10809  
        run: |
          python sub5.py

      - name: 📦 Push to Target Repository
        run: |
          # 1. 配置 Git 基础信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 下载目标仓库
          git clone https://${{ secrets.TARGET_REPO_TOKEN }}@github.com/trevorch/freesub.git
          cd freesub
          
          # 3. 检查文件是否已存在且内容相同，若不同则更新并提交
          if [ -f "../sub5.txt" ]; then
          
            # 新增：检查文件大小是否小于 500 字符
            # wc -c 用于计算字节数，对于纯文本文件，可以近似看作字符数
            file_size=$(wc -c < "../sub5.txt")
            if [ "$file_size" -lt 500 ]; then
              echo "警告：sub5.txt 文件内容小于 500 字符 (当前大小: $file_size)，跳过提交。目标订阅地址内容错误！"
              exit 0 # 使用 exit 0 表示脚本正常结束，只是不满足提交条件
            fi
          
          
          
            # 比较新旧文件内容
            if ! cmp -s "sub5.txt" "../sub5.txt"; then
              echo "发现新节点内容，正在更新文件..."
              cp ../sub5.txt ./
              
              # 4. 提交更改并推送到目标仓库
              git add sub5.txt
              git commit -m "🎉 自动更新 Free Nodes: $(date '+%Y-%m-%d %H:%M:%S')"
              git push origin main 
            else
              echo "节点内容无变化，跳过提交。"
            fi
          else
            echo "警告：未生成 sub5.txt 文件！"
            exit 1
          fi
