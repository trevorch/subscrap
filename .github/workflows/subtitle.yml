name: Fetch YouTube Subtitles

on:
  workflow_dispatch: # 允许在 GitHub 网页上手动点击运行
  push:
    branches: [ main ] # 推送到 main 分支时触发

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Prepare Cookies File
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Run Subtitle Fetcher
        run: |
          python subtitle.py
