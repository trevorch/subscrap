name: sub3搜集

on:
  # 每天北京时间 8:00 自动运行（UTC 0:00）
  schedule:
    - cron: '0 */1 * * *'
  # 支持手动触发
  workflow_dispatch:
env:
  TZ: Asia/Shanghai
  
jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 200        # Whisper 转录较慢，给足时间

    permissions:
      contents: write          # 需要写权限以提交 sub3.txt

    steps:
      # ── 1. 检出仓库 ──────────────────────────────
      - name: 检出仓库
        uses: actions/checkout@v6

      # ── 2. 配置 Python ───────────────────────────
      - name: 配置 Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. 缓存 Whisper 模型（避免每次重新下载 ~460 MB）──
      - name: 缓存 Whisper 模型
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-small-model-v1

      # ── 4. 安装系统依赖 ──────────────────────────
      - name: 安装 ffmpeg
        run: sudo apt-get install -y ffmpeg

      # ── 5. 安装 Python 依赖 ──────────────────────
      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      # ── 6. 运行主脚本 ────────────────────────────
      - name: 运行抓取脚本
        env:
          SUB3_HOME: ${{ vars.SUB3_HOME }}
          SUB3_HOST: ${{ vars.SUB3_HOST }}
          SUB3_VERIFY: ${{ vars.SUB3_VERIFY }}
        run: python sub3.py

      - name: 📦 Push to Target Repository
        run: |
          # 1. 配置 Git 基础信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 下载目标仓库
          git clone https://${{ secrets.TARGET_REPO_TOKEN }}@github.com/trevorch/freesub.git
          cd freesub
          
          # 3. 检查文件是否已存在且内容相同，若不同则更新并提交
          if [ -f "../sub3.txt" ]; then
            # 比较新旧文件内容
            if ! cmp -s "sub3.txt" "../sub3.txt"; then
              echo "发现新节点内容，正在更新文件..."
              cp ../sub3.txt ./
              
              # 4. 提交更改并推送到目标仓库
              git add sub3.txt
              git commit -m "🎉 自动更新 Free Nodes: $(date '+%Y-%m-%d %H:%M:%S')"
              git push origin main 
            else
              echo "节点内容无变化，跳过提交。"
            fi
          else
            echo "警告：未生成 sub3.txt 文件！"
            exit 1
          fi