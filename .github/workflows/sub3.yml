name: sub3搜集

on:
  # 1. 允许手动触发（不再需要日期输入，直接抓取最新）
  workflow_dispatch: 

  # 2. 每3小时自动定时触发
  schedule:
    - cron: '0 */5 * * *' 
env:
  TZ: Asia/Shanghai


jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ── 检出代码 ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── 2. 写入 YouTube Cookies ──────────────────
      # 将 Secret YOUTUBE_COOKIES 中的内容写成文件
      # 如果没有配置 Secret，此步跳过（yt-dlp 将尝试无 cookies 模式）
      - name: 写入 YouTube Cookies 文件
        #if: ${{ secrets.YOUTUBE_COOKIES != '' }}
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > /tmp/cookies.txt
          echo "✅ cookies 写入 /tmp/cookies.txt（$(wc -l < /tmp/cookies.txt) 行）"
        # 注意：不要打印 cookies 内容，防止泄露
          
      # ── Python 环境 ───────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # ── 系统依赖 ──────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          # ffmpeg：yt-dlp 音频转换必需
          sudo apt-get install -y ffmpeg
          curl -fsSL https://deno.land/install.sh | sh
          # 关键修复：将 deno 的路径添加到 GitHub Actions 的全局 PATH 环境变量
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          
      # ── Python 依赖（预装加速后续步骤）─────────────────
      - name: Install Python dependencies
        run: |
          pip install -U pip
          # 3. 安装 yt-dlp 及其默认依赖组，其中包含了 yt-dlp-ejs 脚本包
          pip install -U "yt-dlp[default]"
          # Whisper + PyTorch CPU-only（减小体积）
          pip install openai-whisper
          pip install torch torchvision torchaudio \
            --index-url https://download.pytorch.org/whl/cpu

      # ── 运行主脚本 ────────────────────────────────────
      - name: Run sub3.py
        env:
          SUB3_HOME: ${{ vars.SUB3_HOME }}
          SUB3_HOST: ${{ vars.SUB3_HOST }}
          SUB3_VERIFY: ${{ vars.SUB3_VERIFY }}
        run: |
          python sub3.py

      - name: Push to Target Repository
        run: |
          # 1. 配置 Git 基础信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 下载目标仓库
          git clone https://${{ secrets.TARGET_REPO_TOKEN }}@github.com/trevorch/freesub.git
          cd freesub
          
          # 3. 检查文件是否已存在且内容相同，若不同则更新并提交
          if [ -f "../sub3.txt" ]; then
            # 比较新旧文件内容
            if ! cmp -s "sub3.txt" "../sub3.txt"; then
              echo "发现新节点内容，正在更新文件..."
              cp ../sub3.txt ./
              
              # 4. 提交更改并推送到目标仓库
              git add sub3.txt
              git commit -m "🎉 自动更新 Free Nodes: $(date '+%Y-%m-%d %H:%M:%S')"
              git push origin main 
            else
              echo "节点内容无变化，跳过提交。"
            fi
          else
            echo "警告：未生成 sub3.txt 文件！"
            exit 1
          fi         