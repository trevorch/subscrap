name: sub3搜集

on:
  # 1. 允许手动触发（不再需要日期输入，直接抓取最新）
  workflow_dispatch: 

  # 2. 每3小时自动定时触发
  schedule:
    - cron: '0 */1 * * *' 
env:
  TZ: Asia/Shanghai

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      # ── 1. 检出仓库 ──────────────────────────────
      - name: 检出仓库
        uses: actions/checkout@v6

      # ── 2. 写入 YouTube Cookies ──────────────────
      # 将 Secret YOUTUBE_COOKIES 中的内容写成文件
      # 如果没有配置 Secret，此步跳过（yt-dlp 将尝试无 cookies 模式）
      - name: 写入 YouTube Cookies 文件
        if: ${{ secrets.YOUTUBE_COOKIES != '' }}
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > /tmp/yt_cookies.txt
          echo "✅ cookies 写入 /tmp/yt_cookies.txt（$(wc -l < /tmp/yt_cookies.txt) 行）"
        # 注意：不要打印 cookies 内容，防止泄露

      # ── 3. 配置 Python ───────────────────────────
      - name: 配置 Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 4. 缓存 Whisper 模型（~460 MB，避免每次重新下载）
      - name: 缓存 Whisper small 模型
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-small-v1

      # ── 5. 安装系统依赖 ──────────────────────────
      - name: 安装 ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      # ── 6. 安装 Python 依赖 ──────────────────────
      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      # ── 7. 运行主脚本 ────────────────────────────
      - name: 运行抓取脚本
        env:
          YOUTUBE_COOKIES_FILE: /tmp/yt_cookies.txt
          SUB3_HOME: ${{ vars.SUB3_HOME }}
          SUB3_HOST: ${{ vars.SUB3_HOST }}
          SUB3_VERIFY: ${{ vars.SUB3_VERIFY }}  
        run: python sub3.py


      - name: 📦 Push to Target Repository
        run: |
          # 1. 配置 Git 基础信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 下载目标仓库
          git clone https://${{ secrets.TARGET_REPO_TOKEN }}@github.com/trevorch/freesub.git
          cd freesub
          
          # 3. 检查文件是否已存在且内容相同，若不同则更新并提交
          if [ -f "../sub3.txt" ]; then
            # 比较新旧文件内容
            if ! cmp -s "sub3.txt" "../sub3.txt"; then
              echo "发现新节点内容，正在更新文件..."
              cp ../sub3.txt ./
              
              # 4. 提交更改并推送到目标仓库
              git add sub3.txt
              git commit -m "🎉 自动更新 Free Nodes: $(date '+%Y-%m-%d %H:%M:%S')"
              git push origin main 
            else
              echo "节点内容无变化，跳过提交。"
            fi
          else
            echo "警告：未生成 sub3.txt 文件！"
            exit 1
          fi
          