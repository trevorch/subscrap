name: Fetch YouTube Subtitles

on:
  workflow_dispatch: # 允许在 GitHub 网页上手动点击运行
  

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          
      # ✅ 新增步骤：安装 Deno (JavaScript 运行时)
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # ✅ 修改步骤：安装带 [default] 依赖组的 yt-dlp
          pip install -U "yt-dlp[default]"    
          
      - name: Prepare Cookies File
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Run Subtitle Fetcher
        run: |
          python subtitle.py
