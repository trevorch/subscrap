name: sub5搜集

on:
  schedule:
    - cron: "*/30 * * * *"   # 每30分钟自动运行一次（UTC），北京时间 02/08/14/20 点
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: write             # 允许 push 文件到仓库
env:
  TZ: Asia/Shanghai
  
jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install requests  
        
      - name: Extract test link from README
        id: extract_link
        env:
            SUB5_REPO: ${{ vars.SUB5_REPO }}
        run: |
            python3 <<'EOF'
            import os
            import re
            import requests
         
            sub5_repo = os.environ["SUB5_REPO"]
            url = f"{sub5_repo}/refs/heads/main/README.md"
         
            try:
               print(f"正在获取源文件: {url}")
               response = requests.get(url, timeout=10)
               response.raise_for_status()
               content = response.text
         
               pattern = r'https://fn[^\s`)]+'
               links = re.findall(pattern, content)
         
               if not links:
                     print("未找到以 'https://fn' 开头的链接。")
                     exit(1)
         
               print(f"找到 {len(links)} 个链接，开始处理...")
               first_link = links[0]
               print(f"第一个链接: {first_link}")
         
               github_output = os.environ["GITHUB_OUTPUT"]
               with open(github_output, "a") as f:
                     f.write(f"target_url={first_link}\n")
         
            except requests.exceptions.RequestException as e:
               print(f"网络请求错误: {e}")
               exit(1)
            except Exception as e:
               print(f"发生未知错误: {e}")
               exit(1)
            EOF
        
      - name: Install Xray Core
        run: |
          # 安装 unzip 并下载最新的 Xray (支持 Hysteria2)
          sudo apt-get update && sudo apt-get install -y unzip curl
          curl -L -H "Cache-Control: no-cache" -o /tmp/xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          sudo unzip /tmp/xray.zip -d /usr/local/bin/
          sudo chmod +x /usr/local/bin/xray
          

      - name: Generate VLESS Reality Config
        run: |
          # 在当前用户有权限的 /tmp 目录下创建 xray 配置目录
          mkdir -p /tmp/xray
          
          # 从 GitHub Variables 中读取代理链接
          PROXY_URL="${{ vars.SUB5_PROXY }}"
          
          # 使用 Python 解析 VLESS 链接并生成 config.json
          python3 <<EOF
          import os, json, urllib.parse
          
          proxy_url = os.environ.get("PROXY_URL", "")
          parsed = urllib.parse.urlparse(proxy_url)
          
          # 提取基础信息
          uuid = parsed.username
          host, port = parsed.hostname, parsed.port
          query_params = urllib.parse.parse_qs(parsed.query)
          
          # 构建 VLESS Reality 配置
          config = {
            "log": {"loglevel": "warning"},
            "inbounds": [
              {
                "port": 10809,
                "protocol": "http",
                "settings": {},
                "sniffing": {"enabled": True, "destOverride": ["http", "tls"]}
              }
            ],
            "outbounds": [
              {
                "protocol": "vless",
                "settings": {
                  "vnext": [
                    {
                      "address": host,
                      "port": port,
                      "users": [
                        {
                          "id": uuid,
                          "encryption": query_params.get("encryption", ["none"])[0],
                          "flow": query_params.get("flow", [""])[0]
                        }
                      ]
                    }
                  ]
                },
                "streamSettings": {
                  "network": query_params.get("type", ["tcp"])[0],
                  "security": query_params.get("security", ["none"])[0],
                  "realitySettings": {
                    "serverName": query_params.get("sni", [host])[0],
                    "fingerprint": query_params.get("fp", ["chrome"])[0],
                    "publicKey": query_params.get("pbk", [""])[0],
                    "shortId": query_params.get("sid", [""])[0]
                  }
                },
                "tag": "proxy-out"
              }
            ]
          }
          
          # 写入配置文件到 /tmp/xray/ 目录
          with open("/tmp/xray/config.json", "w") as f:
            json.dump(config, f, indent=2)
          print("✅ Xray VLESS Reality config generated successfully.")
          EOF
        env:
          PROXY_URL: ${{ vars.SUB5_PROXY }} 


      - name: Start Xray Proxy
        run: |
          # 后台启动 Xray
          nohup xray run -config /tmp/xray/config.json > /tmp/xray.log 2>&1 &
          sleep 3
          # 检查是否启动成功
          if pgrep -x "xray" > /dev/null; then
            echo "✅ Xray started successfully."
          else
            echo "❌ Xray failed to start. Logs:"
            cat /tmp/xray.log
            exit 1
          fi

      
      - name: Test Proxy Connection
        run: |
          echo "Testing proxy connection..."
          curl -x http://127.0.0.1:10809 -I "${{ steps.extract_link.outputs.target_url }}"

      - name: Fetch subscription
        env:
          SUB5_REPO: ${{ vars.SUB5_REPO }}
          HTTP_PROXY: http://127.0.0.1:10809
          HTTPS_PROXY: http://127.0.0.1:10809  
        run: |
          python sub5.py

      - name: 📦 Push to Target Repository
        run: |
          # 1. 配置 Git 基础信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 下载目标仓库
          git clone https://${{ secrets.TARGET_REPO_TOKEN }}@github.com/trevorch/freesub.git
          cd freesub
          
          # 3. 检查文件是否已存在且内容相同，若不同则更新并提交
          if [ -f "../sub5.txt" ]; then
          
            # 新增：检查文件大小是否小于 500 字符
            # wc -c 用于计算字节数，对于纯文本文件，可以近似看作字符数
            file_size=$(wc -c < "../sub5.txt")
            if [ "$file_size" -lt 500 ]; then
              echo "警告：sub5.txt 文件内容小于 500 字符 (当前大小: $file_size)，跳过提交。目标订阅地址内容错误！"
              exit 0 # 使用 exit 0 表示脚本正常结束，只是不满足提交条件
            fi
          
          
          
            # 比较新旧文件内容
            if ! cmp -s "sub5.txt" "../sub5.txt"; then
              echo "发现新节点内容，正在更新文件..."
              cp ../sub5.txt ./
              
              # 4. 提交更改并推送到目标仓库
              git add sub5.txt
              git commit -m "🎉 自动更新 Free Nodes: $(date '+%Y-%m-%d %H:%M:%S')"
              git push origin main 
            else
              echo "节点内容无变化，跳过提交。"
            fi
          else
            echo "警告：未生成 sub5.txt 文件！"
            exit 1
          fi
