name: sub5搜集

on:
  schedule:
    - cron: "*/30 * * * *"   # 每30分钟自动运行一次（UTC），北京时间 02/08/14/20 点
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: write             # 允许 push 文件到仓库
env:
  TZ: Asia/Shanghai
  
jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        

      - name: Install Subconverter and Xray
        run: |
          sudo apt-get update && sudo apt-get install -y unzip curl
          # 1. 安装支持多协议的 Xray 核心
          curl -L -H "Cache-Control: no-cache" -o /tmp/xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          sudo unzip /tmp/xray.zip -d /usr/local/bin/
          sudo chmod +x /usr/local/bin/xray
          
          # 2. 安装 subconverter (订阅转换工具)
          curl -L -H "Cache-Control: no-cache" -o /tmp/subconverter.tar.gz https://github.com/tindy2013/subconverter/releases/latest/download/subconverter_linux64.tar.gz
          tar -xzf /tmp/subconverter.tar.gz -C /opt/
          sudo chmod +x /opt/subconverter/subconverter

      - name: Generate Xray Config via Subconverter
        run: |
          # 从 GitHub Variables 中读取动态代理链接
          PROXY_URL="${{ vars.SUB5_PROXY }}"
          
          # 启动 subconverter 后台服务 (默认端口 25500)
          nohup /opt/subconverter/subconverter > /tmp/sub.log 2>&1 &
          sleep 3
          
          # 调用 subconverter API，将任意协议转换为 xray 配置
          # target=xray 表示输出格式为 xray/v2ray 配置
          curl -G "http://127.0.0.1:25500/sub" \
            --data-urlencode "target=xray" \
            --data-urlencode "url=$PROXY_URL" \
            -o /tmp/xray_config.json
          
          # 检查配置文件是否生成成功
          if [ -s /tmp/xray_config.json ]; then
            echo "✅ 动态配置转换成功。"
            # 将生成的配置复制到 Xray 默认路径
            sudo mkdir -p /usr/local/etc/xray
            sudo cp /tmp/xray_config.json /usr/local/etc/xray/config.json
          else
            echo "❌ 配置转换失败，请检查 SUB5_PROXY 链接格式。"
            cat /tmp/sub.log
            exit 1
          fi

      - name: Start Xray Proxy
        run: |
          # 后台启动 Xray
          nohup xray run -config /usr/local/etc/xray/config.json > /tmp/xray.log 2>&1 &
          sleep 3
          # 检查进程是否存活
          if pgrep -x "xray" > /dev/null; then
            echo "✅ Xray 启动成功，本地 HTTP 代理已就绪 (127.0.0.1:10809)"
          else
            echo "❌ Xray 启动失败。日志如下："
            cat /tmp/xray.log
            exit 1
          fi

      - name: Test Proxy Connection
        run: |
          echo "正在测试代理连通性..."
          curl -x http://127.0.0.1:10809 -I https://www.google.com
        

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install requests

      - name: Fetch subscription
        env:
          SUB5_REPO: ${{ vars.SUB5_REPO }}
          HTTP_PROXY: http://127.0.0.1:10809
          HTTPS_PROXY: http://127.0.0.1:10809  
        run: |
          python sub5.py

      - name: 📦 Push to Target Repository
        run: |
          # 1. 配置 Git 基础信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 下载目标仓库
          git clone https://${{ secrets.TARGET_REPO_TOKEN }}@github.com/trevorch/freesub.git
          cd freesub
          
          # 3. 检查文件是否已存在且内容相同，若不同则更新并提交
          if [ -f "../sub5.txt" ]; then
          
            # 新增：检查文件大小是否小于 500 字符
            # wc -c 用于计算字节数，对于纯文本文件，可以近似看作字符数
            file_size=$(wc -c < "../sub5.txt")
            if [ "$file_size" -lt 500 ]; then
              echo "警告：sub5.txt 文件内容小于 500 字符 (当前大小: $file_size)，跳过提交。目标订阅地址内容错误！"
              exit 0 # 使用 exit 0 表示脚本正常结束，只是不满足提交条件
            fi
          
          
          
            # 比较新旧文件内容
            if ! cmp -s "sub5.txt" "../sub5.txt"; then
              echo "发现新节点内容，正在更新文件..."
              cp ../sub5.txt ./
              mkdir -p sub5
              cp ../sub5/* sub5
              
              # 4. 提交更改并推送到目标仓库
              git add sub5.txt sub5
              git commit -m "🎉 自动更新 Free Nodes: $(date '+%Y-%m-%d %H:%M:%S')"
              git push origin main 
            else
              echo "节点内容无变化，跳过提交。"
            fi
          else
            echo "警告：未生成 sub5.txt 文件！"
            exit 1
          fi
