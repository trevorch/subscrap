name: sub0搜集

on:
  schedule:
    - cron: "0 */2 * * *"   # 每6小时自动运行一次（UTC），北京时间 02/08/14/20 点
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: write             # 允许 push 文件到仓库
env:
  TZ: Asia/Shanghai
  
jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install requests playwright

      - name: Install Playwright browsers
        run: |
          playwright install chromium --with-deps

      - name: Fetch subscription
        env:
          SUB0_HOME: ${{ vars.SUB0_HOME }}
          SUB0_HOST: ${{ vars.SUB0_HOST }}
        run: |
          python SUB0.py

      - name: 📦 Push to Target Repository
        run: |
          # 1. 配置 Git 基础信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. 下载目标仓库
          git clone https://${{ secrets.TARGET_REPO_TOKEN }}@github.com/trevorch/freesub.git
          cd freesub
          
          # 3. 检查文件是否已存在且内容相同，若不同则更新并提交
          if [ -f "../sub0.txt" ]; then
            # 比较新旧文件内容
            if ! cmp -s "sub0.txt" "../sub0.txt"; then
              echo "发现新节点内容，正在更新文件..."
              cp ../sub0.txt ./
              mkdir -p sub0
              cp ../sub0/* sub0
              
              # 4. 提交更改并推送到目标仓库
              git add sub0.txt sub0
              git commit -m "🎉 自动更新 Free Nodes: $(date '+%Y-%m-%d %H:%M:%S')"
              git push origin main 
            else
              echo "节点内容无变化，跳过提交。"
            fi
          else
            echo "警告：未生成 sub0.txt 文件！"
            exit 1
          fi
